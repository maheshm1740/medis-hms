spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        globally_quoted_identifiers: false

  cache:
    type: simple

  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisCacheConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

jwt:
  secret: test-256-bit-secret-key-for-testing-purposes-only-replace
  expiration: 86400000
  refresh-expiration: 604800000

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false